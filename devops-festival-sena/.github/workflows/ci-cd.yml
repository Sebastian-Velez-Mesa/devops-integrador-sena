name: DevOps Festival CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── Trabajo 1: Linting y Pruebas Unitarias ──────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar Dependencias del Pipeline
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Verificar Código con Linter (flake8)
        run: |
          # Parar el build si hay errores de sintaxis o variables no definidas
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # Reportar otras advertencias de estilo de forma informativa sin fallar
          flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Ejecutar Pruebas Unitarias (pytest)
        run: |
          pytest backend/test_app.py

  # ── Trabajo 2: Validación de Builds de Docker ────────────────────────
  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verificar Construcción - Imagen Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false  # Solo validación de compilación, no sube a DockerHub
          tags: devops-festival-backend:latest

      - name: Verificar Construcción - Imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false  # Solo validación de compilación, no sube a DockerHub
          tags: devops-festival-frontend:latest

  # ── Trabajo 3: Empaquetar artefactos para entrega ───────────────────
  package-artifacts:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Crear ZIP de entrega
        run: |
          apt-get update && apt-get install -y zip || true
          zip -r devops_submission.zip devops-festival-sena festival-devops concierto-app docs || true

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: devops-submission
          path: devops_submission.zip

  # ── Trabajo 4: Integración y pruebas de extremo a extremo ───────────
  integration-test:
    needs: package-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Levantar servicios con Docker Compose
        run: |
          docker compose up -d --build
        working-directory: ./devops-festival-sena

      - name: Esperar servicios
        run: sleep 10

      - name: Comprobar health del backend
        run: |
          curl --retry 5 --retry-delay 2 -f http://localhost:5000/health

      - name: Comprobar frontend
        run: |
          curl --retry 5 --retry-delay 2 -f http://localhost:8080/ || true

      - name: Capturar logs y subir artefactos
        run: |
          docker compose logs backend > backend_compose.log || true
          docker compose logs > full_compose.log || true
        working-directory: ./devops-festival-sena

      - name: Subir logs como artefactos
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: |
            devops-festival-sena/backend_compose.log
            devops-festival-sena/full_compose.log

      - name: Bajar servicios
        run: docker compose down -v
        working-directory: ./devops-festival-sena
