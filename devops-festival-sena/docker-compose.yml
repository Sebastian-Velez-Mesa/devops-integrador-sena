version: '3.8'

services:
  # ── API REST Backend (Flask + Gunicorn) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops-backend
    ports:
      - "5000:5000"
    volumes:
      - devops-backend-logs:/app/logs
    networks:
      - devops-network
    environment:
      - FLASK_ENV=production
      - PORT=5000
    restart: unless-stopped

  # ── Servidor Web Frontend (Nginx Alpine) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops-frontend
    ports:
      - "8080:80"
    networks:
      - devops-network
    # Inicia el servidor web solo cuando el Backend está completamente saludable (Healthcheck OK)
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Red de Contenedores Personalizada (Bridge) ────────────────────────
networks:
  devops-network:
    driver: bridge
    name: devops-network

# ── Almacenamiento Persistente (Volumen con Nombre) ───────────────────
volumes:
  devops-backend-logs:
    name: devops-backend-logs
