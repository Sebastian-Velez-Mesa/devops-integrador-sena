version: '3.8'

services:
  frontend:
    image: nginx:alpine
    container_name: festival-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - festival-net
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: festival-backend
    ports:
      - "5000:5000"
    volumes:
      - backend-logs:/app/logs
    networks:
      - festival-net
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
    restart: unless-stopped

networks:
  festival-net:
    driver: bridge
    name: festival-net

volumes:
  backend-logs:
    name: festival-backend-logs
